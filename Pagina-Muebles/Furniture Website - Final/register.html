<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrarse | Muebles Ferrer</title>
  <link rel="stylesheet" href="style.css">
  <script>const CONFIG = { API_URL: 'http://127.0.0.1:3001/api' };</script>
</head>
<body>
  <div class="auth-wrapper">
    <form id="register-form" class="auth-card">
      <h2>Crear cuenta</h2>
      <label>Nombre</label>
      <input id="reg-name" type="text" placeholder="Tu nombre" />
      <label>Correo</label>
      <input id="reg-email" type="email" placeholder="correo@ejemplo.com" />
      <label>Contraseña</label>
      <input id="reg-password" type="password" placeholder="Contraseña" />
      <button type="button" id="reg-btn">Registrarse</button>
      <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </form>
  </div>
  <script>
    document.getElementById('reg-btn').addEventListener('click', () => {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!email || !password) return alert('Correo y contraseña obligatorios');
      fetch(`${CONFIG.API_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name, email, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          alert('Registro correcto');
          window.location.href = 'login.html';
        } else {
          alert('Error: ' + (data.error || 'inténtalo de nuevo'));
        }
      })
      .catch(err => alert('Error de conexión'));
    });
  </script>
</body>
</html>
