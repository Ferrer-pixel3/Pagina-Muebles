<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | Muebles Ferrer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>
<body>
  <div class="container">
    <!-- ✅ NAVBAR COMPLETO -->
    <nav class="navbar">
      <div class="navbar-top">
        <div class="logo">
          <i class="fa-solid fa-couch"></i>
          <span id="logo-title">MUEBLES</span>
        </div>
        <div class="search-bar">
          <input id="search-input" type="text" placeholder="¿Qué estás buscando?" />
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="user">
          <i class="fa-solid fa-cart-shopping" id="cart-icon"></i>
          <span id="cart-total">$0.00</span>
          <i class="fa-regular fa-heart" id="fav-icon"></i>
          <i class="fa-solid fa-user" id="profile-icon"></i>
        </div>
      </div>
      <div class="nav-list">
        <a href="index.html"><i class="fa-solid fa-house"></i><span>INICIO</span></a>
        <a href="productos.html"><i class="fa-solid fa-couch"></i><span>PRODUCTOS</span></a>
        <a href="precios.html"><i class="fa-solid fa-dollar-sign"></i><span>PRECIOS</span></a>
        <a href="blog.html"><i class="fa-brands fa-blogger"></i><span>BLOG</span></a>
        <a href="ofertas.html"><i class="fa-solid fa-star"></i><span>OFERTAS</span></a>
        <a href="contacto.html"><i class="fa-solid fa-message"></i><span>CONTACTO</span></a>
      </div>
    </nav>
    <script src="main.js"></script>

    <!-- ✅ SECCIÓN DE CONTACTO -->
    <section class="contact" id="contacto">
      <div class="contact-content">
        <div class="content-left">
          <h2>Suscríbete a nuestro boletín y recibe <span>30% DE DESCUENTO</span></h2>
        </div>
        <div class="content-right">
          <input id="subscribe-email" type="email" placeholder="Tu correo electrónico..." aria-label="Correo electrónico" />
          <button id="subscribe-btn" type="button">REGISTRARSE</button>
        </div>
      </div>
    </section>

    <!-- ✅ FOOTER -->
    <footer class="footer">
      <div class="copyright">
        <p>&copy; 2025 Muebles Ferrer. Todos los derechos reservados.</p>
      </div>
      <div class="brand">
        <i class="fa-solid fa-couch"></i>
        <h1>MUEBLES</h1>
      </div>
    </footer>
  </div>
</body>
</html>
