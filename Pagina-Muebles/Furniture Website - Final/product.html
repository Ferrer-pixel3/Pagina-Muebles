<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Producto | Muebles Ferrer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="productos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="navbar-top">
        <div class="logo"><i class="fa-solid fa-couch"></i><span id="logo-title">MUEBLES</span></div>
        <div class="search-bar"><input id="search-input" type="text" placeholder="¿Qué estás buscando?" /><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="user">
          <i class="fa-solid fa-cart-shopping" id="cart-icon"></i>
          <span id="cart-total">$0.00</span>
          <i class="fa-regular fa-heart" id="fav-icon"></i>
          <i class="fa-solid fa-user" id="profile-icon"></i>
        </div>
      </div>
      <div class="nav-list">
        <a href="index.html"><i class="fa-solid fa-house"></i><span>INICIO</span></a>
        <a href="productos.html"><i class="fa-solid fa-couch"></i><span>PRODUCTOS</span></a>
        <a href="precios.html"><i class="fa-solid fa-dollar-sign"></i><span>PRECIOS</span></a>
        <a href="blog.html"><i class="fa-brands fa-blogger"></i><span>BLOG</span></a>
        <a href="ofertas.html"><i class="fa-solid fa-star"></i><span>OFERTAS</span></a>
        <a href="contacto.html"><i class="fa-solid fa-message"></i><span>CONTACTO</span></a>
      </div>
    </nav>

    <main style="padding:3rem;">
      <div id="product-detail" style="display:flex;gap:2rem;align-items:flex-start;">
        <img id="product-img" src="" alt="Producto" style="width:420px;height:320px;object-fit:cover;border-radius:10px;" />
        <div>
          <h1 id="product-title">Producto</h1>
          <div id="product-stars" style="margin-bottom:8px;color:#f8872b;"></div>
          <p id="product-price" class="price" style="font-size:2rem;color:#073e72;font-weight:700;">$0.00</p>
          <p id="product-desc">Descripción</p>
          <div style="margin-top:1rem;">
            <button class="add-cart">Agregar al carrito</button>
            <button class="add-fav">Agregar a favoritos</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="copyright"><p>&copy; 2025 Muebles Ferrer. Todos los derechos reservados.</p></div>
      <div class="brand"><i class="fa-solid fa-couch"></i><h1>MUEBLES</h1></div>
    </footer>
  </div>

  <script src="main.js"></script>
  <script>
    // Rellenar detalle usando productData (definido en main.js)
    (function(){
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id || !productData[id]) return;
      const p = productData[id];
      document.getElementById('product-img').src = p.img;
      document.getElementById('product-img').alt = p.name;
      document.getElementById('product-title').textContent = p.name;
      document.getElementById('product-price').textContent = `$${p.price.toLocaleString('es-MX', {minimumFractionDigits:2})}`;
      document.getElementById('product-desc').textContent = p.desc;
      // stars
      const starsEl = document.getElementById('product-stars');
      starsEl.innerHTML = '';
      for (let i=0;i<p.stars;i++) starsEl.innerHTML += '<i class="fa-solid fa-star"></i>';
      for (let i=p.stars;i<5;i++) starsEl.innerHTML += '<i class="fa-regular fa-star"></i>';
      // mark the buttons with a parent .product-card so main.js delegation can pick data-id
      const container = document.getElementById('product-detail');
      container.classList.add('product-card');
      container.dataset.id = id;
    })();
  </script>
</body>
</html>
